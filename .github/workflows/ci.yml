name: CI — Lint, Test & Build

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]

jobs:
  # ========== 前端：Lint + Test + Build ==========
  frontend:
    name: Frontend — Lint, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: ESLint 检查
        run: npm run lint
      - name: Vitest 单元测试
        run: npm test
      - name: Vite 构建验证
        run: npm run build
        env:
          NODE_ENV: production

  # ========== 后端：Lint + Test ==========
  backend:
    name: Backend — Lint, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root_pass
          MYSQL_DATABASE: negentropy_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: ESLint 检查
        run: npm run lint
      - name: Node:test 单元测试
        run: npm test
        env:
          DB_HOST: localhost
          DB_USER: root
          DB_PASSWORD: test_root_pass
          DB_NAME: negentropy_test
          JWT_SECRET: ci-test-secret
